<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToxiGotchi — Login</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════════════════════════
       TOXIGOTCHI — NEO-BRUTALISM LOGIN
       Matching the app's brutalist aesthetic
    ══════════════════════════════════════════════════════════════════ */
    
    :root {
      /* Core palette - matching app */
      --ink: #0A0A0A;
      --bone: #F5F0E8;
      --yellow: #FFE500;
      --orange: #FF6B00;
      --green: #00FF41;
      --red: #FF1744;
      --white: #FFFFFF;
      --terminal: #0D0D0D;
      
      /* Structural - matching app */
      --border: 3px solid var(--ink);
      --shadow: 5px 5px 0 var(--ink);
      --shadow-sm: 3px 3px 0 var(--ink);
      --shadow-lg: 8px 8px 0 var(--ink);
      
      /* Fonts - matching app */
      --font-ui: 'Space Mono', monospace;
      --font-hero: 'Press Start 2P', monospace;
    }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html { 
      scroll-behavior: smooth; 
    }

    /* ── Page — dot-grid brutalist background ──────────────────── */
    body {
      min-height: 100vh;
      background-color: var(--bone);
      background-image: radial-gradient(circle, rgba(0,0,0,.18) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--ink);
      font-family: var(--font-ui);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* CRT scanlines — very subtle on the light bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.03) 3px,
        rgba(0,0,0,.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── MAIN CARD ──────────────────────────────────────────────── */
    .card {
      width: min(480px, 94vw);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER — black bar, yellow title ──────────────────────── */
    .header {
      background: var(--ink);
      border: var(--border);
      padding: 24px 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .header__eyebrow {
      font-size: 8px;
      letter-spacing: 4px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header__title {
      font-family: var(--font-hero);
      font-size: clamp(18px, 4.5vw, 24px);
      color: var(--yellow);
      letter-spacing: 3px;
      line-height: 1.4;
      animation: flicker 9s infinite;
    }

    @keyframes flicker {
      0%,88%,90%,92%,100% { opacity: 1; }
      89%,91% { opacity: .3; }
    }

    /* ── CONTENT PANEL — toxic yellow ──────────────────────────── */
    .content-panel {
      background: var(--yellow);
      border: var(--border);
      border-top: none;
      padding: 40px 28px 48px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── LOGO ───────────────────────────────────────────────────── */
    .logo-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo {
      width: 180px;
      max-width: 70%;
      filter: drop-shadow(4px 4px 0 var(--ink));
      image-rendering: pixelated;
    }

    /* ── TAGLINE ────────────────────────────────────────────────── */
    .tagline {
      text-align: center;
      margin-bottom: 12px;
    }

    .tagline-main {
      font-family: var(--font-hero);
      font-size: clamp(14px, 3.5vw, 16px);
      color: var(--ink);
      letter-spacing: 2px;
      line-height: 1.8;
      text-transform: uppercase;
    }

    .tagline-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,0,0,.5);
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── FEATURE GRID ───────────────────────────────────────────── */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      margin: 8px 0;
    }

    .feature-item {
      background: var(--white);
      border: 2px solid var(--ink);
      padding: 12px 8px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 6px;
      display: block;
    }

    .feature-text {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* ── LOGIN BUTTON — matches app's button style ──────────────── */
    .login-btn {
      width: 100%;
      font-family: var(--font-hero);
      font-size: clamp(10px, 2.8vw, 13px);
      font-weight: 700;
      letter-spacing: 2px;
      padding: 20px 16px;
      border: var(--border);
      color: var(--yellow);
      background: var(--ink);
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: var(--shadow);
      transition: transform .06s, box-shadow .06s;
      margin-top: 8px;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .login-btn:hover {
      background: #1e1e1e;
    }

    .login-btn:active {
      transform: translate(5px, 5px);
      box-shadow: 0 0 0 var(--ink);
    }

    /* ── LOADING SCREEN ─────────────────────────────────────────── */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--ink);
      border-top: 4px solid var(--yellow);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: var(--font-hero);
      font-size: clamp(12px, 3.2vw, 16px);
      color: var(--ink);
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.8;
    }

    .loading-sub {
      font-size: 8px;
      letter-spacing: 3px;
      color: rgba(0,0,0,.5);
      text-transform: uppercase;
    }

    .loading .logo {
      width: 120px;
      margin-bottom: 8px;
    }

    /* ── FOOTER NOTE ────────────────────────────────────────────── */
    .footer-note {
      font-size: 7px;
      letter-spacing: 2px;
      color: rgba(0,0,0,.4);
      text-transform: uppercase;
      margin-top: 16px;
    }

    /* ── UTILITY ────────────────────────────────────────────────── */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Header -->
    <div class="header">
      <p class="header__eyebrow">PRODUCTIVITY SURVEILLANCE SYSTEM</p>
      <h1 class="header__title">TOXIGOTCHI</h1>
    </div>

    <!-- Content Panel -->
    <div class="content-panel" id="loginScreen">
      <!-- Logo -->
      <div class="logo-wrapper">
        <img src="logo.png" class="logo" alt="ToxiGotchi" onerror="this.style.display='none'">
      </div>

      <!-- Tagline -->
      <div class="tagline">
        <div class="tagline-main">FOCUS OR ELSE</div>
        <div class="tagline-sub">YOUR PET DEPENDS ON IT</div>
      </div>

      <!-- Feature Grid -->
      <div class="feature-grid">
        <div class="feature-item">
          <span class="feature-icon">🐕</span>
          <span class="feature-text">Digital Pet</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🔥</span>
          <span class="feature-text">Daily Streak</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🏆</span>
          <span class="feature-text">Leaderboards</span>
        </div>
      </div>

      <!-- Login Button -->
      <button class="login-btn" id="loginBtn">
        LOGIN WITH GOOGLE
      </button>

      <div class="footer-note">
        your productivity is being monitored
      </div>
    </div>

    <!-- Loading Screen -->
    <div class="content-panel loading" id="loadingScreen">
      <img src="logo.png" class="logo" alt="ToxiGotchi" onerror="this.style.display='none'">
      
      <div class="loading-spinner"></div>
      
      <div class="loading-text">
        INITIALIZING SYSTEM
      </div>
      
      <div class="loading-sub">
        establishing secure connection...
      </div>

      <div class="footer-note">
        // loading your profile
      </div>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDAHDJX_isTq-x_BTPWBscUrOfd-0cCOI0",
      authDomain: "toxigotchi.firebaseapp.com",
      projectId: "toxigotchi",
      storageBucket: "toxigotchi.firebasestorage.app",
      messagingSenderId: "490464741627",
      appId: "1:490464741627:web:9268d7ad261b2f3692085e"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // DOM Elements
    const loginBtn = document.getElementById("loginBtn");
    const loginScreen = document.getElementById("loginScreen");
    const loadingScreen = document.getElementById("loadingScreen");

    // Login Handler
    loginBtn.onclick = async () => {
      try {
        // Show loading screen
        loginScreen.style.display = "none";
        loadingScreen.style.display = "flex";

        // Trigger Google Sign-In
        await auth.signInWithPopup(provider);

        // Short delay for dramatic effect
        setTimeout(() => {
          window.location.replace("app.html");
        }, 1500);

      } catch (err) {
        console.error("Login error:", err);
        
        // Show error state
        loginScreen.style.display = "block";
        loadingScreen.style.display = "none";
        
        // Optional: Show user-friendly error
        alert("Login failed. Please try again.");
      }
    };

    // Auto-redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.replace("app.html");
      }
    });

    // Handle logo load error (if file doesn't exist)
    document.querySelectorAll('img').forEach(img => {
      img.onerror = function() {
        this.style.display = 'none';
      };
    });
  </script>
</body>
</html>
